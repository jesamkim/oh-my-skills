<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif">
  <!-- Defs: subtle gradients, markers -->
  <defs>
    <!-- Stripe-ish purple gradient for hero accent -->
    <linearGradient id="accentPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#635BFF"/>
      <stop offset="100%" stop-color="#8B7FFF"/>
    </linearGradient>
    <!-- Vercel-ish black gradient -->
    <linearGradient id="accentBlack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#333333"/>
    </linearGradient>
    <!-- Subtle card gradient (Stripe Press style) -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FAFAFA"/>
    </linearGradient>
    <!-- Data layer fill -->
    <linearGradient id="dataBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6F9FF"/>
      <stop offset="100%" stop-color="#EEF3FF"/>
    </linearGradient>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,1 L9,5 L0,9 Z" fill="#8C8C95"/>
    </marker>
    <!-- Soft shadow filter -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Canvas background: pure white -->
  <rect width="960" height="520" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="50" font-size="22" font-weight="700" fill="#0A0A0A" letter-spacing="-0.5">
    Agentic Retrieval Pipeline
  </text>
  <text x="40" y="74" font-size="13" font-weight="400" fill="#6B6B75">
    How a Claude agent orchestrates retrieval, tools, and synthesis
  </text>

  <!-- Divider line (Stripe docs style) -->
  <line x1="40" y1="92" x2="920" y2="92" stroke="#EAEAEA" stroke-width="1"/>

  <!-- ═══════ Node 1: User Query ═══════ -->
  <g filter="url(#softShadow)">
    <rect x="40" y="150" width="160" height="90" rx="10"
          fill="url(#cardBg)" stroke="#E5E5EA" stroke-width="1"/>
  </g>
  <circle cx="60" cy="172" r="5" fill="#635BFF"/>
  <text x="74" y="176" font-size="11" font-weight="600" fill="#635BFF" letter-spacing="0.3">USER</text>
  <text x="60" y="204" font-size="14" font-weight="600" fill="#0A0A0A">Query</text>
  <text x="60" y="223" font-size="12" font-weight="400" fill="#6B6B75">Natural language input</text>

  <!-- ═══════ Node 2: Agent Orchestrator (hero, black Vercel-ish) ═══════ -->
  <g filter="url(#softShadow)">
    <rect x="260" y="130" width="200" height="130" rx="12"
          fill="url(#accentBlack)" stroke="#000000" stroke-width="1"/>
  </g>
  <circle cx="280" cy="152" r="5" fill="#00D9FF"/>
  <text x="294" y="156" font-size="11" font-weight="600" fill="#00D9FF" letter-spacing="0.3">AGENT</text>
  <text x="280" y="186" font-size="15" font-weight="600" fill="#FFFFFF">Claude Opus 4.7</text>
  <text x="280" y="206" font-size="12" font-weight="400" fill="#A0A0AA">Reasoning + tool use</text>
  <text x="280" y="224" font-size="12" font-weight="400" fill="#A0A0AA">Plans, routes, synthesizes</text>
  <!-- Thinking indicator dots -->
  <g>
    <circle cx="280" cy="242" r="2" fill="#635BFF"/>
    <circle cx="290" cy="242" r="2" fill="#635BFF" opacity="0.6"/>
    <circle cx="300" cy="242" r="2" fill="#635BFF" opacity="0.3"/>
  </g>

  <!-- ═══════ Node 3a: Vector Search Tool ═══════ -->
  <g filter="url(#softShadow)">
    <rect x="540" y="110" width="180" height="80" rx="10"
          fill="url(#cardBg)" stroke="#E5E5EA" stroke-width="1"/>
  </g>
  <rect x="540" y="110" width="4" height="80" rx="2" fill="#635BFF"/>
  <text x="556" y="134" font-size="11" font-weight="600" fill="#635BFF" letter-spacing="0.3">TOOL · retrieval</text>
  <text x="556" y="158" font-size="14" font-weight="600" fill="#0A0A0A">Vector Search</text>
  <text x="556" y="176" font-size="12" font-weight="400" fill="#6B6B75">OpenSearch k-NN</text>

  <!-- ═══════ Node 3b: Structured Query Tool ═══════ -->
  <g filter="url(#softShadow)">
    <rect x="540" y="200" width="180" height="80" rx="10"
          fill="url(#cardBg)" stroke="#E5E5EA" stroke-width="1"/>
  </g>
  <rect x="540" y="200" width="4" height="80" rx="2" fill="#00B4A6"/>
  <text x="556" y="224" font-size="11" font-weight="600" fill="#00B4A6" letter-spacing="0.3">TOOL · query</text>
  <text x="556" y="248" font-size="14" font-weight="600" fill="#0A0A0A">SQL on Aurora</text>
  <text x="556" y="266" font-size="12" font-weight="400" fill="#6B6B75">Structured metadata</text>

  <!-- ═══════ Node 4: Response ═══════ -->
  <g filter="url(#softShadow)">
    <rect x="780" y="150" width="140" height="90" rx="10"
          fill="url(#cardBg)" stroke="#E5E5EA" stroke-width="1"/>
  </g>
  <circle cx="800" cy="172" r="5" fill="#10B981"/>
  <text x="814" y="176" font-size="11" font-weight="600" fill="#10B981" letter-spacing="0.3">OUTPUT</text>
  <text x="800" y="204" font-size="14" font-weight="600" fill="#0A0A0A">Answer</text>
  <text x="800" y="223" font-size="12" font-weight="400" fill="#6B6B75">Cited, grounded</text>

  <!-- ═══════ Data Layer (bottom band) ═══════ -->
  <g filter="url(#softShadow)">
    <rect x="540" y="340" width="380" height="100" rx="12"
          fill="url(#dataBg)" stroke="#D6DFF5" stroke-width="1"/>
  </g>
  <text x="560" y="364" font-size="11" font-weight="600" fill="#3B4FCC" letter-spacing="0.5">DATA LAYER</text>
  <!-- Two small chips inside -->
  <g>
    <rect x="560" y="378" width="150" height="48" rx="8" fill="#FFFFFF" stroke="#D6DFF5" stroke-width="1"/>
    <text x="572" y="400" font-size="12" font-weight="600" fill="#0A0A0A">Embeddings</text>
    <text x="572" y="418" font-size="11" font-weight="400" fill="#6B6B75">Titan v2 · 1024-d</text>

    <rect x="730" y="378" width="170" height="48" rx="8" fill="#FFFFFF" stroke="#D6DFF5" stroke-width="1"/>
    <text x="742" y="400" font-size="12" font-weight="600" fill="#0A0A0A">Document corpus</text>
    <text x="742" y="418" font-size="11" font-weight="400" fill="#6B6B75">1.9 PB · 40M docs</text>
  </g>

  <!-- ═══════ Arrows ═══════ -->
  <!-- User → Agent -->
  <path d="M 200 195 L 260 195" stroke="#8C8C95" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="214" y="187" font-size="10" font-weight="500" fill="#6B6B75">①</text>

  <!-- Agent → Vector Search -->
  <path d="M 460 170 C 500 170, 500 150, 540 150" stroke="#8C8C95" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="482" y="148" font-size="10" font-weight="500" fill="#6B6B75">② semantic</text>

  <!-- Agent → SQL -->
  <path d="M 460 220 C 500 220, 500 240, 540 240" stroke="#8C8C95" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="482" y="258" font-size="10" font-weight="500" fill="#6B6B75">③ filter</text>

  <!-- Vector Search → Data Layer (dashed) -->
  <path d="M 630 190 L 630 340" stroke="#B8C5E8" stroke-width="1.2" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow)"/>

  <!-- SQL → Data Layer (dashed) -->
  <path d="M 700 280 L 820 340" stroke="#B8C5E8" stroke-width="1.2" stroke-dasharray="4 4" fill="none" marker-end="url(#arrow)"/>

  <!-- Tools → Agent (return) -->
  <path d="M 540 150 C 500 150, 500 170, 460 170" stroke="#8C8C95" stroke-width="0" fill="none"/>
  <!-- Actual return arrows back to agent -->
  <path d="M 540 130 C 500 110, 480 110, 460 145" stroke="#D6DFF5" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="0"/>
  <text x="478" y="110" font-size="10" font-weight="500" fill="#6B6B75">results</text>

  <!-- Agent → Response -->
  <path d="M 460 195 C 620 195, 620 195, 780 195" stroke="#8C8C95" stroke-width="0" fill="none"/>
  <path d="M 720 320 C 770 320, 820 260, 820 240" stroke="#10B981" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <text x="738" y="316" font-size="10" font-weight="500" fill="#10B981">④ synthesize</text>

  <!-- Footer watermark (Stripe docs like) -->
  <text x="920" y="500" text-anchor="end" font-size="10" font-weight="400" fill="#B0B0B8">
    jesamkim.github.io
  </text>
</svg>
